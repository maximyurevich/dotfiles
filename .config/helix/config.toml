theme = "tokyonight_storm"

[editor]
line-number = "relative"
idle-timeout = 0
auto-pairs = {}
bufferline = "always"

[editor.cursor-shape]
insert = "bar"
normal = "block"
select = "underline"

[editor.file-picker]
hidden = false

[editor.statusline]
mode.normal = "NORMAL"
mode.insert = "INSERT"
mode.select = "SELECT"
left = [
  "mode",
  "separator",
  "file-name",
  "separator",
  "spacer",
  "file-modification-indicator",
]
right = [
  "diagnostics",
  "file-type",
  "file-line-ending",
  "position",
  "file-encoding",
]
separator = "\ue0b1"

[editor.soft-wrap]
enable = true
