], markdown = [
  { formatCommand = "pandoc -f markdown -t gfm -sp --tab-stop=2 --columns=79", formatStdin = true },
], rst = [
  { formatCommand = "pandoc -f rst -t rst -s --columns=79", formatStdin = true },
], vue = [
  { formatCommand = "rustywind --stdin", formatStdin = true },
  { formatCommand = "npx --no-install prettier --stdin --stdin-filepath ${INPUT}", formatStdin = true, rootMarkers = [
    ".prettierrc",
    ".prettierrc.json",
    ".prettierrc.js",
    ".prettierrc.yml",
    ".prettierrc.yaml",
    ".prettierrc.json5",
    ".prettierrc.mjs",
    ".prettierrc.cjs",
    ".prettierrc.toml",
  ] },
  { formatCommand = "eslint_d --fix-to-stdout --stdin --stdin-filename=${INPUT}", formatStdin = true, requireMarker = true, rootMarkers = [
    ".eslintrc",
    ".eslintrc.js",
    ".eslintrc.cjs",
    ".eslintrc.yaml",
    ".eslintrc.yml",
    ".eslintrc.json",
  ] },
], astro = [
  { formatCommand = "rustywind --stdin", formatStdin = true },
  { formatCommand = "npx --no-install prettier --stdin --stdin-filepath ${INPUT}", formatStdin = true, rootMarkers = [
    ".prettierrc",
    ".prettierrc.json",
    ".prettierrc.js",
    ".prettierrc.yml",
    ".prettierrc.yaml",
    ".prettierrc.json5",
    ".prettierrc.mjs",
    ".prettierrc.cjs",
    ".prettierrc.toml",
  ] },
  { formatCommand = "eslint_d --fix-to-stdout --stdin --stdin-filename=${INPUT}", formatStdin = true, requireMarker = true, rootMarkers = [
